[config]
autoboot=0
autoboot_list=0
bootwait=3
verification=1
backlight=100
autohosoff=2
autonogc=1
updater2p=1

[CFW EmuMMC + HOC]
pkg3=atmosphere/package3
emummcforce=1
kip1=atmosphere/kips/hoc.kip
icon=bootloader/res/emummc.bmp

[CFW EmuMMC Clean]
pkg3=atmosphere/package3
emummcforce=1
icon=bootloader/res/emummc.bmp

[CFW SysMMC + HOC]
pkg3=atmosphere/package3
emummc_force_disable=1
kip1=atmosphere/kips/hoc.kip
icon=bootloader/res/sysnand.bmp

[CFW SysMMC Clean]
pkg3=atmosphere/package3
emummc_force_disable=1
icon=bootloader/res/sysnand.bmp

[Semi-Stock (SysMMC)]
pkg3=atmosphere/package3
stock=1
emummc_force_disable=1
icon=bootloader/res/stock.bmp

[100% Stock OFW]
ofw=1
icon=bootloader/res/ofw.bmp
